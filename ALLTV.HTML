        }
    </style>

    <script>
        /* เริ่มต้นส่วนของ JavaScript */
        window.onload = function () {
            // เมื่อหน้าเว็บโหลดเสร็จสมบูรณ์ ให้เรียกใช้งานฟังก์ชันนี้
            var adElements = document.querySelectorAll('[id*="ad"], [class*="ad"], [src*="ads"]');
            // ค้นหาองค์ประกอบทั้งหมดที่มี id หรือ class ที่มีคำว่า "ad" หรือ src ที่มีคำว่า "ads"
            adElements.forEach(function(element) {
                // วนลูปเพื่อตั้งค่าการแสดงผลขององค์ประกอบที่พบ
                element.style.display = 'none';
                // ซ่อนองค์ประกอบที่เกี่ยวข้องกับโฆษณา
            });
        }
